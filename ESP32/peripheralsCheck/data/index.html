<!DOCTYPE html>
<html>

<head>
    <meta charset=utf-8>
    <title>Web Console</title>
    <meta content="width=device-width, initial-scale=1" name=viewport>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="main section text-center">
        <h1 id=title>Web Console</h1>
        <div class="shadow grid gap-2 pannel">
            <div id=control-button>
                <button class="rounded shadow" onclick=terminalClean()>
                    <svg aria-hidden=true data-icon=delete fill=currentColor focusable=false height=1em
                        viewBox="64 64 896 896" width=1em>
                        <path
                            d="M864 256H736v-80c0-35.3-28.7-64-64-64H352c-35.3 0-64 28.7-64 64v80H160c-17.7 0-32 14.3-32 32v32c0 4.4 3.6 8 8 8h60.4l24.7 523c1.6 34.1 29.8 61 63.9 61h454c34.2 0 62.3-26.8 63.9-61l24.7-523H888c4.4 0 8-3.6 8-8v-32c0-17.7-14.3-32-32-32zm-200 0H360v-72h304v72z">
                        </path>
                    </svg>
                </button>
            </div>
            <textarea class="rounded w-full" cols=30 disabled=disabled id=record rows=40 title=record></textarea>
            <div class="gap-2 grid flex w-full" id=terminal>
                <input type="text" class="rounded grow" style="height: 40px;" id=command-text name=cmd>
            </div>
        </div>
        <h1>
    </div>
</body>
<script src="scripts.js"></script>

</html>
